<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张雪峰视角 · AI 对话</title>
    <meta name="description" content="基于张雪峰思维框架的AI对话系统，提供教育选择、职业规划、阶层流动等问题的专业分析。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">峰</div>
                    <div class="logo-text">
                        <h1>张雪峰视角</h1>
                        <span class="logo-subtitle">AI 思维顾问</span>
                    </div>
                </div>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建对话
            </button>

            <div class="sessions-list" id="sessionsList">
                <!-- 动态生成 -->
            </div>

            <div class="sidebar-footer">
                <div class="model-info" id="modelInfo">
                    <div class="status-dot"></div>
                    <span>连接中...</span>
                </div>
                <div class="sidebar-quote">
                    「选择比努力更重要」
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 移动端顶栏 -->
            <header class="mobile-header">
                <button class="menu-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h2>张雪峰视角</h2>
                <div style="width:24px"></div>
            </header>

            <!-- 欢迎页 -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-avatar">
                    <div class="welcome-avatar-inner">峰</div>
                    <div class="welcome-avatar-ring"></div>
                </div>
                <h2 class="welcome-title">你好，我是张雪峰</h2>
                <p class="welcome-desc">
                    我用数据说话，不说废话。<br>
                    高考志愿、考研选择、职业规划——你问，我答。
                </p>
                <div class="welcome-cards">
                    <button class="welcome-card" data-question="我孩子今年高考，河南560分，想学金融，你怎么看？">
                        <div class="card-icon">🎓</div>
                        <div class="card-text">高考志愿</div>
                        <div class="card-desc">河南560分想学金融</div>
                    </button>
                    <button class="welcome-card" data-question="我本科双非，想考研到985，值得吗？还是直接工作？">
                        <div class="card-icon">📚</div>
                        <div class="card-text">考研抉择</div>
                        <div class="card-desc">双非考研到985值不值</div>
                    </button>
                    <button class="welcome-card" data-question="AI时代来了，普通家庭的孩子学什么专业最稳？">
                        <div class="card-icon">🤖</div>
                        <div class="card-text">AI时代</div>
                        <div class="card-desc">普通家庭选什么专业</div>
                    </button>
                    <button class="welcome-card" data-question="家里没钱，该不该为了理想去学艺术？">
                        <div class="card-icon">🎨</div>
                        <div class="card-text">理想与现实</div>
                        <div class="card-desc">没钱该不该追求艺术</div>
                    </button>
                </div>
            </div>

            <!-- 聊天消息区 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 动态生成 -->
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        placeholder="问我高考志愿、考研、职业规划..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    基于张雪峰公开言论构建 · 非本人观点 · 仅供参考
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
